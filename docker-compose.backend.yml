version: '3.8'

# ============================================================
# NEXUS BACKEND - PostgreSQL + MinIO (Redis Externo)
# ============================================================
# Este compose é para a branch backend-api
# Substitui o Supabase por PostgreSQL puro + MinIO
# Otimizado para deploy no Easypanel (sem Nginx - usa Traefik)
# Redis agora é gerenciado de forma independente pelo Easypanel.
# ============================================================

services:
  # ============================================================
  # POSTGRESQL - Banco de dados principal
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: nexus_erp
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-backend

  # ============================================================
  # MINIO - Storage S3-compatible
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nexus
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?MINIO_PASSWORD is required}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"   # API S3
      - "127.0.0.1:9001:9001"   # Console Web
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-backend

  # ============================================================
  # BACKEND API - Node.js (desenvolvimento)
  # ============================================================
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: nexus-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://nexus:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/nexus_erp
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      SEED_SECRET: ${SEED_SECRET:-}
      JWT_EXPIRES_IN: 7d
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: nexus
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:?MINIO_PASSWORD is required}
      MINIO_BUCKET: nexus-uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: npm run dev
    networks:
      - nexus-backend
    profiles:
      - dev

  # ============================================================
  # BACKEND API - Node.js (produção)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://nexus:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/nexus_erp
      REDIS_HOST: ${REDIS_HOST:?REDIS_HOST is required}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@${REDIS_HOST}:${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      SEED_SECRET: ${SEED_SECRET:-}
      JWT_EXPIRES_IN: 7d
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: nexus
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:?MINIO_PASSWORD is required}
      MINIO_BUCKET: nexus-uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-https://seu-app.vercel.app}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - nexus-backend
    profiles:
      - production

  # ============================================================
  # PGADMIN - Administração PostgreSQL (opcional)
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexus-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexus.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - nexus-backend
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  nexus-backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
