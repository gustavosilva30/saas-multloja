version: '3.8'

# =============================================================
# NexusERP — Docker Compose para Easypanel
#
# No Easypanel crie 3 serviços separados (Apps):
#   1. nexus-postgres  — usar template PostgreSQL do painel
#   2. nexus-minio     — App customizada (este compose)
#   3. nexus-backend   — App via GitHub (este compose)
#
# Redis é opcional; adicione se precisar de cache/filas.
# O Easypanel gerencia SSL/TLS e domínios via Traefik.
# =============================================================

services:
  # -----------------------------------------------------------
  # POSTGRESQL
  # Prefira usar o serviço gerenciado do Easypanel (mais fácil).
  # Só use este bloco se quiser controle total via compose.
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: nexus_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  # -----------------------------------------------------------
  # MINIO — Armazenamento de arquivos (S3-compatível)
  # No Easypanel: App customizada com imagem minio/minio:latest
  # Domínio sugerido: storage.seudominio.com (porta 9000)
  # Console:         minio-console.seudominio.com (porta 9001)
  # -----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://minio-console.${DOMAIN}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nexus-network

  # -----------------------------------------------------------
  # BACKEND API — Node.js/Express
  # No Easypanel: App via GitHub repo, build automático no push
  # Domínio sugerido: api.seudominio.com
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000

      # Database — use o host interno do Easypanel se usar serviço gerenciado
      DATABASE_URL: postgresql://nexus:${DB_PASSWORD}@postgres:5432/nexus_erp

      # JWT — gere com: node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-nexus-uploads}

      # CORS — URL do frontend na Vercel
      CORS_ORIGIN: ${FRONTEND_URL}

    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nexus-network

  # -----------------------------------------------------------
  # REDIS — Cache e filas (opcional)
  # Adicione apenas quando implementar filas/cache no backend
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nexus-network

volumes:
  postgres_data:
  minio_data:
  redis_data:

networks:
  nexus-network:
    driver: bridge
