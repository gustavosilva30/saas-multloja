version: '3.8'

services:
  # ============================================================
  # POSTGRESQL - Banco de dados principal
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexus_password_2024}
      POSTGRES_DB: nexus_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  # ============================================================
  # MINIO - Storage de arquivos (S3 compatível)
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nexus
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio_password_2024}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  # ============================================================
  # BACKEND API - Node.js/Express
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000

      # Database
      DATABASE_URL: postgresql://nexus:${DB_PASSWORD}@postgres:5432/nexus_erp

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: nexus
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_BUCKET: nexus-uploads

      # CORS
      CORS_ORIGIN: ${FRONTEND_URL}

    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nexus-network

  # ============================================================
  # REDIS - Cache e sessões (opcional, mas recomendado)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - nexus-network

  # ============================================================
  # NGINX - Reverse Proxy (opcional, para produção)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - nexus-network
    profiles:
      - production

volumes:
  postgres_data:
  minio_data:
  redis_data:

networks:
  nexus-network:
    driver: bridge
